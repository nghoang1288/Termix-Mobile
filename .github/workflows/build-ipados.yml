name: Build iOS Universal App

on:
  workflow_dispatch:

jobs:
  build-ios-universal:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Verify universal device support
        run: |
          SUPPORTS_TABLET=$(node -p "require('./app.json').expo.ios.supportsTablet === true ? 'true' : 'false'")
          BUNDLE_ID=$(node -p "require('./app.json').expo.ios.bundleIdentifier")
          VERSION=$(node -p "require('./app.json').expo.version")

          echo "Bundle ID: $BUNDLE_ID"
          echo "Version: $VERSION"
          echo "supportsTablet: $SUPPORTS_TABLET"

          if [ "$SUPPORTS_TABLET" != "true" ]; then
            echo "ERROR: iOS build must support both iPhone and iPad."
            exit 1
          fi

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release directory
        run: mkdir -p release

      - name: Build unsigned universal IPA
        run: |
          cd ios

          # Generic iOS device + supportsTablet=true produces a universal iPhone/iPad app.
          xcodebuild -workspace SSHBridge.xcworkspace \
            -scheme SSHBridge \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ../release/SSHBridge.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Create unsigned universal IPA
        run: |
          cd release
          mkdir -p Payload
          cp -r SSHBridge.xcarchive/Products/Applications/SSHBridge.app Payload/
          zip -r sshbridge_ios_universal_${{ steps.version.outputs.version }}.ipa Payload
          rm -rf Payload

      - name: Upload iOS universal IPA
        uses: actions/upload-artifact@v4
        with:
          name: sshbridge_ios_universal_${{ steps.version.outputs.version }}
          path: release/sshbridge_ios_universal_${{ steps.version.outputs.version }}.ipa
          retention-days: 30
          if-no-files-found: error
